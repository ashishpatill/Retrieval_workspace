name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "BIMWeb"
      - "bimrag-backend"
      - "deploy.sh"
      - "deploy-manifest.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
          - production
      components:
        description: "Components to deploy"
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - backend

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'BIMWeb'
              - 'deploy.sh'
            backend:
              - 'bimrag-backend'
              - 'deploy.sh'

  deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.frontend == 'true' ||
      needs.detect-changes.outputs.backend == 'true'
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'sandbox' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve deploy flags
        id: flags
        env:
          INPUT_COMPONENTS: ${{ github.event.inputs.components || 'all' }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          args=("$DEPLOY_ENV")
          if [[ "$INPUT_COMPONENTS" == "all" ]]; then
            [[ "$FRONTEND_CHANGED" == "true" || "$EVENT_NAME" == "workflow_dispatch" ]] && args+=("--frontend")
            [[ "$BACKEND_CHANGED" == "true" || "$EVENT_NAME" == "workflow_dispatch" ]] && args+=("--backend")
          elif [[ "$INPUT_COMPONENTS" == "frontend" ]]; then
            args+=("--frontend")
          else
            args+=("--backend")
          fi
          args+=("--force")
          echo "args=${args[*]}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: contains(steps.flags.outputs.args, '--frontend')
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: contains(steps.flags.outputs.args, '--frontend')
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: BIMWeb/pnpm-lock.yaml

      - name: Install BIMWeb dependencies
        if: contains(steps.flags.outputs.args, '--frontend')
        working-directory: BIMWeb
        run: pnpm install --frozen-lockfile

      - name: Run unified deploy script
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x deploy.sh
          if [[ "$DEPLOY_ENV" == "production" && -n "$VERCEL_TOKEN" ]]; then
            echo "$VERCEL_TOKEN" | npx vercel@latest login --token-stdin 2>/dev/null || true
          fi
          set +e
          ./deploy.sh ${{ steps.flags.outputs.args }}
          code=$?
          set -e
          if [[ "$code" -ne 0 && "$DEPLOY_ENV" == "production" && -z "$VERCEL_TOKEN" ]]; then
            echo "::warning::VERCEL_TOKEN not set — frontend production deploy skipped"
            exit 0
          fi
          exit "$code"

      - name: Backend production note
        if: contains(steps.flags.outputs.args, '--backend') && env.DEPLOY_ENV == 'production'
        run: |
          echo "Production backend rolls out via bimrag-backend/services/bimcloud/.github/workflows/deploy.yml"
          echo "Configure GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT on bimcloud repo."
