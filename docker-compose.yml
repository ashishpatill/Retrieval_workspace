# BIMRAG ecosystem — backend services for local dev and CI E2E.
# BIMWeb runs separately (pnpm dev / Playwright webServer).
#
# Usage:
#   docker compose up -d
#   ./run-scenarios.sh all
#   docker compose down

services:
  bimindex:
    build:
      context: ./bimrag-backend/services/bimindex
      dockerfile: Dockerfile
      target: api
    ports:
      - "8001:8001"
    environment:
      BIMINDEX_PORT: "8001"
      DEMO_MODE: "false"
      DENSE_EMBEDDING_BACKEND: "${DENSE_EMBEDDING_BACKEND:-hashed}"
    volumes:
      - bimindex-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  bimextract:
    build:
      context: ./bimrag-backend/services/bimextract
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    environment:
      BIMEXTRACT_PORT: "8200"
      BIMINDEX_URL: "http://bimindex:8001"
    depends_on:
      bimindex:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8200/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  bimagent:
    build:
      context: ./bimrag-backend/services/bimagent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      BIMINDEX_URL: "http://bimindex:8001"
      BIMEXTRACT_URL: "http://bimextract:8200"
    depends_on:
      bimindex:
        condition: service_healthy
      bimextract:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  bimcloud:
    build:
      context: ./bimrag-backend/services/bimcloud
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BIMAGENT_URL: "http://bimagent:8000"
      BIMCLOUD_REGION: "local"
    depends_on:
      bimagent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  bimindex-data:
